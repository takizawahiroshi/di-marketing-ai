# DI Marketing AI — ハーネス設定
# backend/agent_registry.py と agent_runner.py が参照する設定

models:
  planner:    "claude-sonnet-4-6"
  agent:      "claude-sonnet-4-6"
  compressor: "claude-haiku-4-5-20251001"
  synthesizer: "claude-sonnet-4-6"

max_tokens:
  planner:    500
  agent:      1800
  compressor: 180
  synthesizer: 2200

timeouts:
  compress_sec: 8
  agent_sec:    120

pipeline:
  max_agents_per_run: 4
  min_agents_per_run: 2
  max_results_stored: 50
  baton_max_chars: 150
  knowledge_max_chars: 6000
  synthesis_knowledge_chars: 3000

cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:5500"
    - "null"
