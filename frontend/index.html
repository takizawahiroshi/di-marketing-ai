<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DI Marketing AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" crossorigin>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="hdr">
  <div class="hdr-brand">
    <div class="hdr-mark">DI</div>
    <span class="hdr-name">MARKETING AI</span>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-orch" onclick="setMode('orch')">ORCHESTRATE</button>
    <button class="mode-tab" id="tab-agents" onclick="setMode('agents')">AGENTS</button>
  </div>
  <div class="hdr-space"></div>
  <div class="hdr-status">
    <span class="status-dot err" id="api-dot"></span>
    <span id="api-txt" style="color:rgba(255,255,255,.80);font-size:10px;font-family:var(--mono);letter-spacing:.04em;">connecting...</span>
  </div>
  <button class="hdr-btn" onclick="openModal('ctx-modal')">＋ データ登録</button>
  <button id="menu-btn" onclick="toggleMenu()" style="display:none;padding:4px 10px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:14px;cursor:pointer;">☰</button>
</div>

<div id="fs-toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:#1A1D23;color:#fff;font-size:13px;padding:10px 22px;border-radius:100px;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:999;opacity:0;transition:all .3s;pointer-events:none;font-family:var(--sans);"></div>

<div id="app">
  <nav id="left">
    <!-- ORCH mode nav -->
    <div id="ln-orch-content" style="display:flex;flex:1;flex-direction:column;overflow:hidden;">
      <div class="lp-section">task history</div>
      <div id="history-list"><div class="hist-empty">タスクはまだありません。</div></div>
      <div class="ctx-panel">
        <div class="ctx-label">context data</div>
        <div class="ctx-row"><span class="ctx-dot" id="cdot-survey"></span><span class="ctx-key">survey</span><span class="ctx-val" id="cval-survey">—</span></div>
        <div class="ctx-row"><span class="ctx-dot" id="cdot-persona"></span><span class="ctx-key">persona</span><span class="ctx-val" id="cval-persona">—</span></div>
        <div class="ctx-row"><span class="ctx-dot" id="cdot-brief"></span><span class="ctx-key">brief</span><span class="ctx-val" id="cval-brief">—</span></div>
        <button class="ctx-add-btn" onclick="openModal('ctx-modal')">+ データを追加</button>
      </div>
    </div>
    <!-- AGENTS mode nav -->
    <div id="ln-agents-content" style="display:none;flex:1;overflow-y:auto;flex-direction:column;">
      <div class="lp-section">カテゴリ</div>
      <div id="nav-agents-list"></div>
    </div>
  </nav>

  <div id="main">
    <!-- VIEW: AGENTS -->
    <div id="view-agents" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div id="view-agents-inner" style="flex:1;overflow-y:auto;padding:24px 28px;">
        <div class="agents-hero">
          <h1 style="font-family:var(--serif);font-weight:400;font-style:italic;font-size:22px;">エージェントを選ぶ</h1>
          <p>話しかけたいAIを選んでください。コンテキストデータが自動で引き継がれます。</p>
        </div>
        <div id="cards-container"></div>
      </div>
    </div>

    <!-- VIEW: AGENT CHAT -->
    <div id="view-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="chat-hdr">
        <button class="chat-back" onclick="showAgentsView()">← 一覧へ</button>
        <div class="chat-agent-icon" id="chat-icon"></div>
        <div>
          <div class="chat-agent-name" id="chat-name"></div>
          <div class="chat-agent-cat" id="chat-cat"></div>
        </div>
      </div>
      <div id="msgs"></div>
      <div class="chat-input-area">
        <div class="chat-row">
          <textarea id="ci" rows="1" placeholder="メッセージを入力… (Ctrl+Enter で送信)"></textarea>
          <button id="send-btn" onclick="sendMsg()">送信</button>
        </div>
      </div>
    </div>

    <!-- VIEW: ORCHESTRATE -->
    <div id="view-orch" style="display:flex;flex:1;flex-direction:column;overflow:hidden;position:relative;">
      <!-- 空白時: ランディング -->
      <div id="orch-landing">
        <div class="orch-landing-inner">
          <p class="orch-landing-title">// ORCHESTRATE</p>
          <p class="orch-landing-sub">マーケティング課題を入力してください。AIが自動でエージェントを選び実行します</p>
          <div class="orch-landing-input-wrap">
            <div class="orch-landing-row">
              <textarea id="task-input" rows="2" placeholder="例：30代女性向け新商品のコンセプトとキャッチコピーをリサーチから一気に作りたい"></textarea>
              <button id="run-btn" onclick="runOrchestrator()">▶ 実行</button>
            </div>
            <div id="hint-chips" class="iz-hints" style="margin-top:10px;"></div>
          </div>
        </div>
      </div>
      <!-- 実行後: 結果エリア -->
      <div id="exec-area" style="display:none;flex:1;overflow-y:auto;padding:14px 20px;background:var(--bg);">
        <div id="baton-indicator" style="display:none;align-items:center;gap:8px;padding:8px 16px;background:var(--panel);border:1px solid var(--blue-lt);font-size:11px;color:var(--blue);font-family:var(--mono);margin:0 0 8px;border-radius:4px;"></div>
        <div id="exec-content"></div>
      </div>
      <!-- 実行後: 下部固定入力 -->
      <div id="input-zone" style="display:none;">
        <div class="iz-row">
          <textarea id="task-input-bottom" rows="1" placeholder="続けて課題を入力…" style="flex:1;background:rgba(255,255,255,.95);border:1.5px solid rgba(255,255,255,.6);color:#111;font-size:13px;font-family:var(--sans);padding:9px 14px;resize:none;outline:none;min-height:38px;max-height:80px;line-height:1.5;border-radius:6px;"></textarea>
          <button id="run-btn-bottom" onclick="runOrchestratorBottom()" style="padding:9px 18px;background:var(--blue2);color:#FFFFFF;border:none;font-size:13px;font-family:var(--sans);font-weight:700;cursor:pointer;border-radius:4px;white-space:nowrap;flex-shrink:0;">▶ 実行</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONTEXT MODAL -->
<div class="overlay" id="ctx-modal">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">CONTEXT DATA</span><button class="modal-close" onclick="closeModal('ctx-modal')">&times;</button></div>
    <div class="modal-body">
      <div class="m-block"><div class="m-label">survey // アンケート結果・調査まとめ</div><textarea class="m-ta" id="ctx-survey-in" placeholder="集計結果、主要な発見事項..."></textarea></div>
      <div class="m-block"><div class="m-label">persona // ターゲット・ペルソナ</div><textarea class="m-ta" id="ctx-persona-in" placeholder="田中美咲（32歳・会社員）..."></textarea></div>
      <div class="m-block"><div class="m-label">brief // 案件背景・目的</div><textarea class="m-ta" id="ctx-brief-in" placeholder="クライアント：○○株式会社..."></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn-s" onclick="closeModal('ctx-modal')">cancel</button><button class="btn-p" onclick="saveCtx()">save</button></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
